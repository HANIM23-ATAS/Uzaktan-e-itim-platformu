version: "3.9"

services:
  golearn:
    build: .
    container_name: golearn_api
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      DB_PATH: "/data/golearn.db"
      JWT_SECRET: "change-me-in-production"
      RATE_LIMIT: "5"
      BURST_LIMIT: "10"
    volumes:
      # Persist SQLite database between container restarts
      - golearn_data:/data
    restart: unless-stopped

volumes:
  golearn_data:
